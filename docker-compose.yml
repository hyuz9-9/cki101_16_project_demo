services:
  web:
    # 指定使用當前目錄下的 Dockerfile 進行建置
    build:
      context: .
      dockerfile: Dockerfile
    # 將主機的 Port 80 映射到容器內部的 Port 5000
    ports:
      - "80:5000"
    # 設定容器重啟原則
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=mysql.cki101
      - DB_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      # 掛載本地 GCP 憑證目錄以利容器內使用本地 ADC 進行驗證 (macOS / Linux 預設路徑)
      - ~/.config/gcloud:/root/.config/gcloud



  db:
    image: mysql:8.4
    container_name: mysql.cki101
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8625:3306"
    volumes:
      - ./db_data:/var/lib/mysql

