<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用者管理系統 - cki101</title>
    <!-- 引入高品質字型 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-focus-border: rgba(129, 140, 248, 0.6);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --secondary-gradient: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --danger-bg: rgba(239, 68, 68, 0.15);
            --danger-border: rgba(239, 68, 68, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --danger-color: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 1;
        }

        /* 頂部標題 */
        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
        }

        /* 雙欄佈局 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: 4fr 6fr;
            }
        }

        /* 毛玻璃卡片基底 */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        /* 表單設計 */
        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            border-color: var(--glass-focus-border);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 按鈕設計 */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            outline: none;
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 使用者列表設計 */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* 自訂捲軸 */
        .user-list::-webkit-scrollbar {
            width: 6px;
        }
        .user-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .user-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .user-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.4s ease forwards;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #ffffff;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .user-name {
            font-weight: 600;
            color: #ffffff;
            font-size: 1rem;
        }

        .user-age {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-delete {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-color);
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
        }

        /* 載入中動畫 */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        /* 空白狀態 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        /* 自訂 Toast 提示系統 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            min-width: 280px;
            padding: 1rem;
            border-radius: 12px;
            color: #ffffff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.9);
        }

        .toast-error {
            background: rgba(244, 63, 94, 0.9);
        }

        /* 動畫效果 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <header>
            <h1>使用者管理系統</h1>
            <p>cki101 Python Project - Flask & MySQL CRUD Web UI</p>
        </header>

        <div class="content-grid">
            <!-- 左欄：新增使用者 -->
            <div class="glass-card">
                <h2 class="card-title">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    新增使用者
                </h2>
                <form id="addUserForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" class="form-input" placeholder="請輸入姓名" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="age">年紀</label>
                        <input type="number" id="age" class="form-input" placeholder="請輸入年齡" required min="1" max="150">
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                        送出新增
                    </button>
                </form>
            </div>

            <!-- 右欄：使用者列表 -->
            <div class="glass-card">
                <h2 class="card-title">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    使用者列表
                </h2>
                <div id="loading" class="spinner"></div>
                <div class="user-list" id="userList" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        // API 位置定義
        const API_URL = '/api/users';

        // 頁面載入完成後載入使用者
        document.addEventListener('DOMContentLoaded', fetchUsers);

        // 表單提交事件
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value);

            if (!name || isNaN(age)) {
                showToast('請正確填寫姓名與年齡！', 'error');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, age })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('使用者新增成功！', 'success');
                    document.getElementById('addUserForm').reset();
                    fetchUsers(); // 重新整理列表
                } else {
                    showToast(data.error || '新增失敗', 'error');
                }
            } catch (error) {
                showToast('無法連線到伺服器', 'error');
                console.error(error);
            }
        });

        // 獲取使用者清單
        async function fetchUsers() {
            const userList = document.getElementById('userList');
            const loading = document.getElementById('loading');
            
            userList.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (response.ok) {
                    renderUsers(data);
                } else {
                    showToast('載入清單失敗！', 'error');
                }
            } catch (error) {
                showToast('無法讀取使用者資料庫', 'error');
                console.error(error);
            } finally {
                loading.style.display = 'none';
                userList.style.display = 'flex';
            }
        }

        // 渲染使用者項目
        function renderUsers(users) {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            if (users.length === 0) {
                userList.innerHTML = `
                    <div class="empty-state">
                        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.978 11.978 0 0112 20.25a11.98 11.98 0 01-3-.109v-.109m6-1.116a8.25 8.25 0 01-6 0M9 19.128a9.38 9.38 0 01-2.625.372 9.337 9.337 0 01-4.121-.952 4.125 4.125 0 017.533-2.493M9 19.128v-.003c0-1.113.285-2.16.786-3.07M9 19.128v.109A12.042 12.042 0 019 19.128zm6 0v.109a12.042 12.042 0 010-.109zM12 12a3 3 0 100-6 3 3 0 000 6zm0 0a3 3 0 100 6 3 3 0 000-6z"></path></svg>
                        <span>目前還沒有任何使用者</span>
                        <span style="font-size: 0.8rem; opacity: 0.7;">請使用左側表單新增資料</span>
                    </div>
                `;
                return;
            }

            users.forEach((user) => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.id = `user-${user.id}`;

                // 取得名字的第一個字元當作頭貼文字
                const firstChar = user.name ? user.name.substring(0, 1).toUpperCase() : 'U';

                item.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">${firstChar}</div>
                        <div class="user-details">
                            <span class="user-name">${escapeHTML(user.name)}</span>
                            <span class="user-age">${user.age} 歲</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteUser(${user.id})">刪除</button>
                `;
                userList.appendChild(item);
            });
        }

        // 刪除使用者
        async function deleteUser(id) {
            if (!confirm('您確定要刪除此使用者嗎？')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('使用者已被刪除', 'success');
                    
                    // 動態移除 DOM 節點
                    const item = document.getElementById(`user-${id}`);
                    if (item) {
                        item.style.animation = 'fadeOut 0.3s ease forwards';
                        setTimeout(() => {
                            fetchUsers(); // 重新抓取更新後的清單以維持空狀態檢驗
                        }, 300);
                    }
                } else {
                    showToast(data.error || '刪除失敗', 'error');
                }
            } catch (error) {
                showToast('無法連線到伺服器', 'error');
                console.error(error);
            }
        }

        // 自訂動態 Toast 提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            // 加入簡易 svg 圖標
            const icon = type === 'success' 
                ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            // 觸發進場動畫
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);

            // 3秒後退場移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // 防止 HTML 注入的安全跳脫函式
        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
