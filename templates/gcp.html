<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS 儲存桶瀏覽器 - cki101</title>
    <!-- 引入高品質字型 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-focus-border: rgba(129, 140, 248, 0.6);
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --secondary-gradient: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --danger-color: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 1;
        }

        /* 頂部標題 */
        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
        }

        /* 雙欄佈局 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: 4fr 6fr;
            }
        }

        /* 毛玻璃卡片基底 */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        /* 表單設計 */
        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            border-color: var(--glass-focus-border);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 按鈕設計 */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            outline: none;
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 儲存桶列表設計 */
        .bucket-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* 自訂捲軸 */
        .bucket-list::-webkit-scrollbar {
            width: 6px;
        }
        .bucket-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .bucket-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .bucket-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .bucket-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.4s ease forwards;
        }

        .bucket-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
        }

        .bucket-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .bucket-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--secondary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.3);
            color: #ffffff;
        }

        .bucket-name {
            font-weight: 600;
            color: #ffffff;
            font-size: 1.05rem;
            word-break: break-all;
        }

        .bucket-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .meta-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .meta-val {
            color: #e2e8f0;
            font-weight: 400;
        }

        /* 載入中動畫 */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: 3rem auto;
        }

        /* 空白狀態與說明 */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .empty-state svg {
            color: rgba(255, 255, 255, 0.15);
        }

        /* 自訂 Toast 提示系統 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            max-width: 350px;
            padding: 1rem;
            border-radius: 12px;
            color: #ffffff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.9);
        }

        .toast-error {
            background: rgba(244, 63, 94, 0.95);
        }

        .toast span {
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 動畫效果 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <header>
            <h1>GCS 儲存桶瀏覽器</h1>
            <p>cki101 Python Project - GCP Cloud Storage Browser</p>
        </header>

        <div class="content-grid">
            <!-- 左欄：專案查詢設定 -->
            <div class="glass-card">
                <h2 class="card-title">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    專案設定
                </h2>
                <form id="gcpForm">
                    <div class="form-group">
                        <label for="projectId">GCP Project ID</label>
                        <input type="text" id="projectId" class="form-input" placeholder="請輸入專案 ID" required autocomplete="on">
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                        查詢 Buckets
                    </button>
                </form>
            </div>

            <!-- 右欄：儲存桶列表 -->
            <div class="glass-card">
                <h2 class="card-title">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    儲存桶列表 (Buckets)
                </h2>
                <div id="loading" class="spinner" style="display: none;"></div>
                <div class="bucket-list" id="bucketList">
                    <div class="empty-state" id="initialState">
                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <span>請在左側輸入 GCP Project ID 開始查詢</span>
                        <span style="font-size: 0.8rem; opacity: 0.6; max-width: 250px;">系統將使用您本機的 Application Default Credentials (ADC) 進行驗證。</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 路由
        const API_URL = '/api/gcp/buckets';

        // 提交查詢
        document.getElementById('gcpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const projectId = document.getElementById('projectId').value.trim();

            if (!projectId) {
                showToast('請輸入有效的 Project ID！', 'error');
                return;
            }

            const bucketList = document.getElementById('bucketList');
            const loading = document.getElementById('loading');
            
            // 開啟 Loading
            bucketList.style.display = 'none';
            loading.style.display = 'block';

            try {
                // 發送 GET 請求
                const response = await fetch(`${API_URL}?project_id=${encodeURIComponent(projectId)}`);
                const data = await response.json();

                if (response.ok) {
                    renderBuckets(data);
                    if (data.length > 0) {
                        showToast(`成功讀取到 ${data.length} 個儲存桶！`, 'success');
                    } else {
                        showToast('查詢成功，但該專案下無任何儲存桶。', 'success');
                    }
                } else {
                    // 顯示後端拋出的錯誤訊息
                    showToast(data.error || '無法查詢儲存桶', 'error');
                    renderErrorState(data.error || '無法查詢儲存桶');
                }
            } catch (error) {
                showToast('無法連線到伺服器 API', 'error');
                renderErrorState('無法連線到伺服器 API');
                console.error(error);
            } finally {
                loading.style.display = 'none';
                bucketList.style.display = 'flex';
            }
        });

        // 渲染儲存桶卡片
        function renderBuckets(buckets) {
            const bucketList = document.getElementById('bucketList');
            bucketList.innerHTML = '';

            if (buckets.length === 0) {
                bucketList.innerHTML = `
                    <div class="empty-state">
                        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                        <span>此專案沒有任何 Cloud Storage 儲存桶。</span>
                    </div>
                `;
                return;
            }

            buckets.forEach((bucket) => {
                const item = document.createElement('div');
                item.className = 'bucket-item';

                item.innerHTML = `
                    <div class="bucket-header">
                        <div class="bucket-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"></path></svg>
                        </div>
                        <span class="bucket-name">${escapeHTML(bucket.name)}</span>
                    </div>
                    <div class="bucket-meta-grid">
                        <div>
                            <span class="meta-label">地區：</span>
                            <span class="meta-val">${escapeHTML(bucket.location)} (${escapeHTML(bucket.location_type)})</span>
                        </div>
                        <div>
                            <span class="meta-label">儲存級別：</span>
                            <span class="meta-val">${escapeHTML(bucket.storage_class)}</span>
                        </div>
                        <div style="grid-column: span 2;">
                            <span class="meta-label">建立時間：</span>
                            <span class="meta-val">${escapeHTML(bucket.time_created)}</span>
                        </div>
                    </div>
                `;
                bucketList.appendChild(item);
            });
        }

        // 錯誤狀態頁面顯示
        function renderErrorState(errorMsg) {
            const bucketList = document.getElementById('bucketList');
            bucketList.innerHTML = `
                <div class="empty-state" style="color: #f43f5e;">
                    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <span style="font-weight: 600;">查詢發生錯誤</span>
                    <span style="font-size: 0.85rem; opacity: 0.8; text-align: center; max-width: 320px; word-break: break-all;">
                        ${escapeHTML(errorMsg)}
                    </span>
                    <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 1rem; text-align: center; max-width: 320px;">
                        請確認您的憑證是否已使用 <code>gcloud auth application-default login</code> 登入，且擁有該 GCP 專案的 <code>Storage Admin</code> 或 <code>Storage Viewer</code> 權限。
                    </span>
                </div>
            `;
        }

        // 自訂動態 Toast 提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' 
                ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('show');
            }, 10);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 4500); // 延長錯誤提示停留時間，以便閱讀 GCP 連線錯誤訊息
        }

        // HTML 跳脫防止注入
        function escapeHTML(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
